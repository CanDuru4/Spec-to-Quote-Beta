# Spec-to-Quote Copilot — run in a safe, reproducible environment
# Usage: docker compose up --build   then open http://localhost:8000
services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    # Optional: persist uploads (run once: docker compose run --user root app chown -R nobody:nogroup /app/backend/uploads)
    # volumes:
    #   - uploads:/app/backend/uploads
    restart: unless-stopped

